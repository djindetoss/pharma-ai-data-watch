<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Briefing (Plain Text) — Pharma AI & Data Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=email2" />
  <style>
    body { background: #f1f5f9; }

    .email-page {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 14px;
    }
    .page-title { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
    .page-sub   { font-size: 13px; color: #64748b; line-height: 1.5; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .copy-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #0f172a; color: #fff; border: none;
      border-radius: 8px; padding: 10px 20px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background 0.15s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #1e293b; }
    .copy-btn.copied { background: #059669; }

    /* ── Week selector ── */
    .week-select-wrap {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px;
    }
    .week-select-wrap label { font-size: 13px; font-weight: 600; color: #475569; }
    #week-select {
      font-size: 13px; padding: 6px 10px; border: 1.5px solid #cbd5e1;
      border-radius: 6px; background: #fff; color: #0f172a;
      font-family: inherit; cursor: pointer;
    }

    /* ── Section selector ── */
    .section-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .section-selector label {
      font-size: 12px; font-weight: 600; color: #475569;
      display: flex; align-items: center; gap: 5px;
      background: #fff; border: 1.5px solid #e2e8f0;
      border-radius: 6px; padding: 5px 12px;
      cursor: pointer; transition: border-color 0.12s;
    }
    .section-selector input[type=checkbox] { accent-color: #0f172a; }
    .section-selector label:has(input:checked) {
      border-color: #0f172a; background: #f8fafc;
    }

    /* ── Plain text textarea ── */
    .text-frame {
      background: #fff;
      border: 1.5px solid #cbd5e1;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .text-frame-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      gap: 10px;
      flex-wrap: wrap;
    }
    .text-frame-bar span {
      font-size: 12px; color: #94a3b8; font-weight: 500;
    }
    .char-count {
      font-size: 12px; font-weight: 600; color: #64748b;
    }
    #email-text {
      width: 100%;
      box-sizing: border-box;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      line-height: 1.65;
      color: #0f172a;
      border: none;
      resize: vertical;
      padding: 20px 24px;
      min-height: 520px;
      outline: none;
      background: #fff;
    }

    /* ── Loading ── */
    .loading { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">AI</div>
        <div class="logo-text">
          <span class="logo-title">Pharma AI &amp; Data Watch</span>
          <span class="logo-sub">Intelligence portal · Drug development</span>
        </div>
      </a>
      <nav>
        <a href="index.html">Portal</a>
        <a href="briefing.html">📰 Briefing</a>
        <a href="digest.html">📊 Digest</a>
      </nav>
      <div class="header-actions">
        <a href="briefing.html" class="btn-subscribe" style="text-decoration:none;">← Full briefing</a>
      </div>
    </div>
  </header>

  <div class="email-page">

    <div class="page-header">
      <div>
        <div class="page-title">✉️ Email — Plain Text Briefing</div>
        <div class="page-sub">
          Select the sections you want to include, then click <strong>Copy</strong>.<br/>
          Paste directly into Outlook, Gmail, or any email client.
        </div>
      </div>
      <div class="controls">
        <button class="copy-btn" id="copy-btn" onclick="copyText()">📋 Copy text</button>
      </div>
    </div>

    <div class="week-select-wrap">
      <label for="week-select">Edition:</label>
      <select id="week-select" onchange="loadBriefing(this.value)">
        <option>Loading…</option>
      </select>
    </div>

    <!-- Section checkboxes — populated dynamically -->
    <div class="section-selector" id="section-selector"></div>

    <div class="text-frame">
      <div class="text-frame-bar">
        <span>Plain text — ready to paste into email</span>
        <span class="char-count" id="char-count">—</span>
      </div>
      <textarea id="email-text" spellcheck="false" readonly>Loading…</textarea>
    </div>

  </div>

  <script>
  'use strict';

  let _briefing   = null;
  let _sections   = [];  // [{id, title, icon, checked}]

  function fmtDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }); }
    catch { return iso; }
  }

  /* ── Build plain text ── */
  function buildText(b, selectedIds) {
    if (!b) return '';
    const SEP  = '─'.repeat(60);
    const SEP2 = '═'.repeat(60);
    const lines = [];

    // Header
    lines.push(SEP2);
    lines.push(`PHARMA AI & DATA WATCH — AI Intelligence Briefing`);
    lines.push(`${b.weekLabel || b.id}  |  ${fmtDate(b.weekStart)} — ${fmtDate(b.weekEnd)}`);
    lines.push(SEP2);
    lines.push('');

    // Lead story
    const ls = b.leadStory || {};
    if (ls.headline) {
      lines.push('★ LEAD STORY');
      lines.push('');
      lines.push(ls.headline.toUpperCase());
      if (ls.standfirst) { lines.push(''); lines.push(ls.standfirst); }
      if (ls.body)       { lines.push(''); lines.push(ls.body); }
      const leadSrcs = (ls.sources || []).filter(s => s.url && s.url !== '#');
      if (leadSrcs.length) {
        lines.push('');
        lines.push('Sources: ' + leadSrcs.map(s => `${s.source} — ${s.url}`).join(' | '));
      }
      lines.push('');
      lines.push(SEP);
      lines.push('');
    }

    // Sections
    const sections = (b.sections || []).filter(s => selectedIds.includes(s.id));
    for (const sec of sections) {
      lines.push(`${sec.icon || '•'} ${sec.title.toUpperCase()}`);
      lines.push('');
      const items = sec.items || [];
      items.forEach((item, i) => {
        lines.push(`${String(i + 1).padStart(2, '0')}. ${item.headline}`);
        if (item.body) {
          lines.push('');
          lines.push(`    ${item.body.replace(/\n/g, '\n    ')}`);
        }
        const srcs = (item.sources || []).filter(s => s.url && s.url !== '#');
        if (srcs.length) {
          lines.push('');
          lines.push('    → ' + srcs.map(s => `${s.source}: ${s.url}`).join(' | '));
        }
        if (i < items.length - 1) lines.push('');
      });
      lines.push('');
      lines.push(SEP);
      lines.push('');
    }

    // Pharma focus (if present and selected)
    const pf = b.pharmaFocus;
    if (pf && selectedIds.includes('pharmaFocus') && pf.items?.length) {
      lines.push(`🧬 ${(pf.headline || 'PHARMA & DRUG DEVELOPMENT').toUpperCase()}`);
      if (pf.standfirst) { lines.push(''); lines.push(pf.standfirst); }
      lines.push('');
      pf.items.forEach((item, i) => {
        lines.push(`${String(i + 1).padStart(2, '0')}. ${item.headline}`);
        if (item.body) { lines.push(''); lines.push(`    ${item.body}`); }
        const srcs = (item.sources || []).filter(s => s.url && s.url !== '#');
        if (srcs.length) { lines.push(''); lines.push('    → ' + srcs.map(s => `${s.source}: ${s.url}`).join(' | ')); }
        if (i < pf.items.length - 1) lines.push('');
      });
      lines.push('');
      lines.push(SEP);
      lines.push('');
    }

    // Editor note
    if (b.editorNote && selectedIds.includes('_editor')) {
      lines.push('✍️  EDITOR\'S ANALYSIS');
      lines.push('');
      lines.push(b.editorNote);
      lines.push('');
      lines.push(SEP);
      lines.push('');
    }

    // Footer
    lines.push('Read the full briefing online:');
    lines.push('https://djindetoss.github.io/pharma-ai-data-watch/briefing.html');
    lines.push('');
    lines.push('Pharma AI & Data Watch — maintained by Félicien Tosso (FAMHP Belgium)');
    lines.push(SEP2);

    return lines.join('\n');
  }

  /* ── Build section checkboxes ── */
  function buildSelector(b) {
    const wrap = document.getElementById('section-selector');
    _sections = [];

    // Always include lead
    _sections.push({ id: '_lead', label: '★ Lead story', checked: true, fixed: true });

    // Dynamic sections from briefing
    for (const sec of b.sections || []) {
      _sections.push({ id: sec.id, label: `${sec.icon} ${sec.title} (${sec.items?.length || 0})`, checked: true });
    }

    // Pharma focus if present
    if (b.pharmaFocus?.items?.length) {
      _sections.push({ id: 'pharmaFocus', label: `🧬 Pharma Focus (${b.pharmaFocus.items.length})`, checked: true });
    }

    // Editor note
    if (b.editorNote) {
      _sections.push({ id: '_editor', label: '✍️ Editor\'s note', checked: true });
    }

    wrap.innerHTML = _sections.map(s => `
      <label>
        <input type="checkbox" value="${s.id}" ${s.checked ? 'checked' : ''} onchange="refreshText()"/>
        ${s.label}
      </label>`).join('');
  }

  /* ── Get selected section IDs ── */
  function getSelected() {
    return [...document.querySelectorAll('#section-selector input:checked')].map(i => i.value);
  }

  /* ── Refresh textarea ── */
  function refreshText() {
    if (!_briefing) return;
    const selected = getSelected();
    // Always include lead
    const ids = selected.includes('_lead')
      ? selected
      : ['_lead', ...selected];
    const text = buildText(_briefing, ids);
    const ta = document.getElementById('email-text');
    ta.value = text;
    document.getElementById('char-count').textContent = `${text.length.toLocaleString()} characters`;
  }

  /* ── Copy ── */
  function copyText() {
    const ta = document.getElementById('email-text');
    navigator.clipboard.writeText(ta.value).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copy text'; btn.classList.remove('copied'); }, 2500);
    }).catch(() => {
      ta.select();
      document.execCommand('copy');
    });
  }

  /* ── Load briefing ── */
  async function loadBriefing(id) {
    if (!id) return;
    document.getElementById('email-text').value = `Loading ${id}…`;
    document.getElementById('section-selector').innerHTML = '';
    try {
      const res = await fetch(`./data/briefings/${id}.json?v=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      _briefing = await res.json();
      buildSelector(_briefing);
      refreshText();
    } catch (e) {
      document.getElementById('email-text').value = `Error: ${e.message}`;
    }
  }

  /* ── Init ── */
  async function init() {
    try {
      const res = await fetch(`./data/briefings/index.json?v=${Date.now()}`);
      const index = await res.json();
      const sel = document.getElementById('week-select');
      sel.innerHTML = index.map(e => `<option value="${e.id}">${e.weekLabel}</option>`).join('');
      if (index.length) await loadBriefing(index[0].id);
    } catch (e) {
      document.getElementById('email-text').value = `Could not load briefing index: ${e.message}`;
    }
  }

  init();
  </script>
</body>
</html>
