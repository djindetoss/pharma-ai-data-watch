<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Briefing — Pharma AI & Data Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=email1" />
  <style>
    body { background: #f1f5f9; }

    /* ── Page wrapper ── */
    .email-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title { font-size: 20px; font-weight: 800; color: #0f172a; }
    .page-sub   { font-size: 13px; color: #64748b; margin-top: 2px; }

    .copy-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #0f172a; color: #fff; border: none;
      border-radius: 8px; padding: 10px 20px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background 0.15s;
    }
    .copy-btn:hover { background: #1e293b; }
    .copy-btn.copied { background: #059669; }

    .open-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: #fff; color: #0f172a;
      border: 1.5px solid #cbd5e1; border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 600;
      text-decoration: none; transition: border-color 0.15s;
    }
    .open-btn:hover { border-color: #94a3b8; }

    .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    /* ── Week selector ── */
    .week-select-wrap {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px;
    }
    .week-select-wrap label { font-size: 13px; font-weight: 600; color: #475569; }
    #week-select {
      font-size: 13px; padding: 6px 10px; border: 1.5px solid #cbd5e1;
      border-radius: 6px; background: #fff; color: #0f172a;
      font-family: inherit; cursor: pointer;
    }

    /* ── Email preview frame ── */
    .preview-frame {
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .preview-bar {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .preview-dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .preview-bar span {
      font-size: 11.5px; color: #94a3b8;
      margin-left: auto; font-weight: 500;
    }
    #email-preview {
      padding: 0;
      /* Rendered email HTML goes here */
    }

    /* ── Loading ── */
    .loading {
      text-align: center; padding: 60px 20px;
      color: #94a3b8; font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">AI</div>
        <div class="logo-text">
          <span class="logo-title">Pharma AI &amp; Data Watch</span>
          <span class="logo-sub">Intelligence portal · Drug development</span>
        </div>
      </a>
      <nav>
        <a href="index.html">Portal</a>
        <a href="briefing.html">📰 Briefing</a>
        <a href="digest.html">📊 Digest</a>
      </nav>
      <div class="header-actions">
        <a href="briefing.html" class="btn-subscribe" style="text-decoration:none;">← Full briefing</a>
      </div>
    </div>
  </header>

  <div class="email-page">
    <div class="page-header">
      <div>
        <div class="page-title">✉️ Email Briefing — Frontier LLMs & Must-Reads</div>
        <div class="page-sub">Copy the HTML below and paste it into your email client or newsletter tool.</div>
      </div>
      <div class="controls">
        <button class="copy-btn" id="copy-btn" onclick="copyEmailHtml()">📋 Copy email HTML</button>
        <button class="open-btn" onclick="openInTab()">🔗 Open in new tab</button>
      </div>
    </div>

    <div class="week-select-wrap">
      <label for="week-select">Edition:</label>
      <select id="week-select" onchange="loadBriefing(this.value)">
        <option>Loading…</option>
      </select>
    </div>

    <div class="preview-frame">
      <div class="preview-bar">
        <div class="preview-dot" style="background:#fc5c57"></div>
        <div class="preview-dot" style="background:#fdbc2c"></div>
        <div class="preview-dot" style="background:#25c840"></div>
        <span>Email preview — 600px width</span>
      </div>
      <div id="email-preview">
        <div class="loading">Loading briefing…</div>
      </div>
    </div>
  </div>

  <script>
  'use strict';

  let _emailHtml = '';
  let _currentBriefingId = '';

  function fmtDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }); }
    catch { return iso; }
  }

  /* ────────────────────────────────────────────────
     Generate email-compatible HTML (table-based,
     inline styles, max 600px, no external fonts)
  ──────────────────────────────────────────────── */
  function buildEmailHtml(b) {
    const weekLabel   = b.weekLabel || b.id;
    const ls          = b.leadStory || {};
    const frontier    = (b.sections || []).find(s => s.id === 'frontier') || {};
    const regulatory  = (b.sections || []).find(s => s.id === 'regulatory') || {};
    const pharmaFocus = b.pharmaFocus || {};

    // Only the top items for email (not to overwhelm)
    const frontierItems   = (frontier.items   || []).slice(0, 6);
    const regulatoryItems = (regulatory.items || []).slice(0, 3);
    const pharmaItems     = (pharmaFocus.items || []).slice(0, 4);

    const mustReadBadge = `<span style="display:inline-block;background:#fef3c7;color:#92400e;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:3px;margin-bottom:6px;">⭐ Must read</span>`;

    function itemRow(item, num, accent, bg) {
      const srcLinks = (item.sources || []).filter(s => s.url && s.url !== '#')
        .map(s => `<a href="${s.url}" style="color:${accent};font-size:11px;font-weight:600;text-decoration:none;margin-right:8px;">${s.source || 'Source'}</a>`)
        .join('');
      return `
        <tr>
          <td style="padding:14px 24px 14px 0;border-bottom:1px solid #e2e8f0;vertical-align:top;width:28px;">
            <span style="font-size:16px;font-weight:800;color:#cbd5e1;font-variant-numeric:tabular-nums;">${String(num).padStart(2,'0')}</span>
          </td>
          <td style="padding:14px 0;border-bottom:1px solid #e2e8f0;vertical-align:top;">
            <div style="font-family:Georgia,serif;font-size:14.5px;font-weight:700;color:#0f172a;line-height:1.35;margin-bottom:6px;">${item.headline || ''}</div>
            <div style="font-size:13px;color:#475569;line-height:1.7;margin-bottom:8px;">${item.body || ''}</div>
            ${srcLinks ? `<div style="margin-top:2px;">${srcLinks}</div>` : ''}
          </td>
        </tr>`;
    }

    function sectionBlock(title, icon, accent, bg, items) {
      if (!items.length) return '';
      const rows = items.map((it, i) => itemRow(it, i+1, accent, bg)).join('');
      return `
        <!-- ${title} -->
        <tr><td colspan="2" style="padding:0;">
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:28px 0 0;">
            <tr>
              <td style="padding:10px 16px;background:${bg};border-left:4px solid ${accent};border-radius:0 6px 6px 0;margin-bottom:4px;">
                <span style="font-size:13px;font-weight:800;color:${accent};text-transform:uppercase;letter-spacing:0.8px;">${icon} ${title}</span>
                <span style="font-size:11px;color:#94a3b8;margin-left:8px;">${items.length} items</span>
              </td>
            </tr>
          </table>
          <table width="100%" cellpadding="0" cellspacing="0" border="0">
            ${rows}
          </table>
        </td></tr>`;
    }

    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>AI Intelligence Briefing — ${weekLabel}</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">

<!-- Wrapper -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f1f5f9;padding:32px 0;">
<tr><td align="center">

<!-- Email container -->
<table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

  <!-- Header bar -->
  <tr>
    <td style="background:#0f172a;padding:20px 28px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td>
            <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#0ea5e9;margin-bottom:4px;">Pharma AI &amp; Data Watch</div>
            <div style="font-size:18px;font-weight:700;color:#ffffff;">AI Intelligence Briefing</div>
          </td>
          <td align="right" valign="middle">
            <div style="font-size:12px;color:rgba(255,255,255,0.45);text-align:right;">${weekLabel}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.3);text-align:right;margin-top:3px;">${fmtDate(b.weekStart)} — ${fmtDate(b.weekEnd)}</div>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Must-read banner -->
  <tr>
    <td style="background:#fef3c7;padding:10px 28px;border-bottom:2px solid #fbbf24;">
      <span style="font-size:12px;font-weight:700;color:#92400e;">⭐ ${frontierItems.length} Frontier LLM stories · ${pharmaItems.length} Pharma implications · Not to be missed this week</span>
    </td>
  </tr>

  <!-- Lead story -->
  <tr>
    <td style="padding:28px 28px 20px;">
      <div style="display:inline-block;background:#0ea5e9;color:#fff;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:3px 10px;border-radius:3px;margin-bottom:14px;">🔺 Lead Story</div>
      <div style="font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:700;color:#0f172a;line-height:1.25;margin-bottom:12px;">${ls.headline || 'AI Intelligence Briefing'}</div>
      <div style="font-size:14px;color:#334155;line-height:1.6;border-left:3px solid #0ea5e9;padding-left:14px;margin-bottom:14px;">${ls.standfirst || ''}</div>
      <div style="font-size:13.5px;color:#475569;line-height:1.75;">${ls.body || ''}</div>
    </td>
  </tr>

  <!-- Divider -->
  <tr><td style="padding:0 28px;"><div style="border-top:1px solid #e2e8f0;"></div></td></tr>

  <!-- Sections -->
  <tr>
    <td style="padding:8px 28px 28px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">

        ${sectionBlock('Frontier AI & Foundation Models', '🤖', '#534AB7', '#f5f3ff', frontierItems)}
        ${sectionBlock('Regulatory & Policy', '🏛️', '#0F6E56', '#f0fdf4', regulatoryItems)}
        ${sectionBlock('Pharma & Drug Development', '🧬', '#1e40af', '#eff6ff', pharmaItems)}

      </table>
    </td>
  </tr>

  <!-- Editor note -->
  ${b.editorNote ? `
  <tr>
    <td style="padding:0 28px 24px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="background:#f8fafc;border-left:4px solid #2563eb;padding:14px 18px;border-radius:0 8px 8px 0;">
            <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#2563eb;margin-bottom:5px;">✍️ Editor's analysis</div>
            <div style="font-size:13px;color:#334155;line-height:1.65;font-style:italic;">${b.editorNote}</div>
          </td>
        </tr>
      </table>
    </td>
  </tr>` : ''}

  <!-- CTA -->
  <tr>
    <td style="padding:0 28px 32px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0f172a;border-radius:10px;">
        <tr>
          <td style="padding:22px 24px;">
            <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:6px;">Read the full briefing</div>
            <div style="font-size:12.5px;color:rgba(255,255,255,0.55);margin-bottom:16px;">All ${(b.sections||[]).reduce((n,s)=>n+(s.items?.length||0),0)+(b.pharmaFocus?.items?.length||0)} stories · ${b.allSources?.length||0} sources cited</div>
            <a href="https://djindetoss.github.io/pharma-ai-data-watch/briefing.html"
               style="display:inline-block;background:#0ea5e9;color:#fff;font-size:13px;font-weight:700;text-decoration:none;padding:10px 22px;border-radius:6px;">
              Open full briefing →
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Footer -->
  <tr>
    <td style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:18px 28px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td>
            <div style="font-size:11px;color:#94a3b8;line-height:1.6;">
              <strong style="color:#64748b;">Pharma AI &amp; Data Watch</strong> · Weekly AI intelligence for pharma &amp; regulatory professionals<br/>
              Maintained by Félicien Tosso · FAMHP Belgium
            </div>
          </td>
          <td align="right" valign="middle">
            <a href="https://djindetoss.github.io/pharma-ai-data-watch/" style="font-size:11px;color:#0ea5e9;text-decoration:none;font-weight:600;">Visit portal →</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>

</table>
<!-- /Email container -->

</td></tr>
</table>
<!-- /Wrapper -->

</body>
</html>`;
  }

  /* ── Render preview ── */
  function renderPreview(html) {
    const el = document.getElementById('email-preview');
    // Use iframe for true email rendering isolation
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:100%;border:none;display:block;';
    iframe.onload = () => {
      iframe.style.height = (iframe.contentDocument.body.scrollHeight + 32) + 'px';
    };
    el.innerHTML = '';
    el.appendChild(iframe);
    iframe.contentDocument.open();
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
  }

  /* ── Copy to clipboard ── */
  function copyEmailHtml() {
    if (!_emailHtml) return;
    navigator.clipboard.writeText(_emailHtml).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 Copy email HTML';
        btn.classList.remove('copied');
      }, 2500);
    }).catch(() => {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = _emailHtml;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copy email HTML'; btn.classList.remove('copied'); }, 2500);
    });
  }

  /* ── Open in new tab ── */
  function openInTab() {
    if (!_emailHtml) return;
    const w = window.open('', '_blank');
    w.document.write(_emailHtml);
    w.document.close();
  }

  /* ── Load briefing ── */
  async function loadBriefing(id) {
    if (!id) return;
    _currentBriefingId = id;
    document.getElementById('email-preview').innerHTML = '<div class="loading">Loading briefing ' + id + '…</div>';
    try {
      const res = await fetch(`./data/briefings/${id}.json?v=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const b = await res.json();
      _emailHtml = buildEmailHtml(b);
      renderPreview(_emailHtml);
    } catch (e) {
      document.getElementById('email-preview').innerHTML =
        `<div class="loading" style="color:#ef4444;">Error loading briefing: ${e.message}</div>`;
    }
  }

  /* ── Init ── */
  async function init() {
    try {
      const res = await fetch(`./data/briefings/index.json?v=${Date.now()}`);
      const index = await res.json();
      const sel = document.getElementById('week-select');
      sel.innerHTML = index.map(e => `<option value="${e.id}">${e.weekLabel}</option>`).join('');
      if (index.length) await loadBriefing(index[0].id);
    } catch(e) {
      document.getElementById('email-preview').innerHTML =
        `<div class="loading" style="color:#ef4444;">Could not load briefing index.</div>`;
    }
  }

  init();
  </script>
</body>
</html>
