name: Check event links

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 7:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Check all event links in events.json
        id: check
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, ssl, time, os, sys

          with open('portal/data/events.json') as f:
              events = json.load(f)

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          H = {'User-Agent': 'Mozilla/5.0 (compatible; PharmaAI-LinkChecker/1.0)'}

          broken = []
          stale  = []
          today  = __import__('datetime').date.today()
          MAX_DAYS = 90

          seen_urls = {}
          for ev in events:
              url = ev['url']
              ev_id = ev.get('id', '?')
              title = ev.get('title', '')

              # Check staleness (url_verified too old)
              try:
                  vdate = __import__('datetime').date.fromisoformat(ev['url_verified'])
                  days = (today - vdate).days
                  if days > MAX_DAYS:
                      stale.append(f"- **{title}** ({ev_id}): verified {days} days ago → {url}")
              except:
                  stale.append(f"- **{title}** ({ev_id}): missing url_verified field → {url}")

              # Skip duplicate URL checks
              if url in seen_urls:
                  continue
              seen_urls[url] = True

              # HTTP check
              try:
                  req = urllib.request.Request(url, headers=H, method='HEAD')
                  with urllib.request.urlopen(req, timeout=12, context=ctx) as r:
                      status = r.status
              except urllib.error.HTTPError as e:
                  try:
                      with urllib.request.urlopen(
                          urllib.request.Request(url, headers=H), timeout=12, context=ctx
                      ) as r2:
                          status = r2.status
                  except Exception:
                      status = e.code
              except Exception as e:
                  status = str(e)

              ok = str(status) in ('200','301','302','303','307','308')
              # 403 = bot-block but URL typically accessible in browser — skip
              if not ok and str(status) != '403':
                  broken.append(f"- [{ev_id}] **{title}**\n  Status: `{status}`\n  URL: {url}")
              time.sleep(0.3)

          # Write outputs
          has_issue = bool(broken or stale)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"has_issue={'true' if has_issue else 'false'}\n")
              f.write(f"broken_count={len(broken)}\n")
              f.write(f"stale_count={len(stale)}\n")

          report = []
          if broken:
              report.append(f"## ❌ {len(broken)} broken link(s)\n" + '\n'.join(broken))
          if stale:
              report.append(f"## ⏰ {len(stale)} stale link(s) (not re-verified in {MAX_DAYS}+ days)\n" + '\n'.join(stale))

          with open('/tmp/link_report.md', 'w') as f:
              f.write('\n\n'.join(report) if report else 'All links OK ✅')

          if broken:
              print(f"BROKEN LINKS FOUND: {len(broken)}", file=sys.stderr)
              sys.exit(1)
          else:
              print(f"✅ All links OK ({len(events)} events checked, {len(stale)} stale)")
          PYEOF

      - name: Create GitHub issue for broken/stale links
        if: failure() || steps.check.outputs.has_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const report = fs.readFileSync('/tmp/link_report.md', 'utf8')
            const broken = '${{ steps.check.outputs.broken_count }}' || '0'
            const stale  = '${{ steps.check.outputs.stale_count }}'  || '0'

            // Check if an open issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'events-link-check',
              state: 'open'
            })

            const body = `## 🔗 Events page link check — ${new Date().toISOString().split('T')[0]}

            ${report}

            ---
            *Auto-generated by the weekly link checker. Edit \`portal/data/events.json\` to fix:*
            *1. Update the \`url\` field with the correct URL*
            *2. Update \`url_verified\` to today's date (YYYY-MM-DD)*
            *3. Run \`node .github/scripts/build-events.mjs\` to rebuild*
            `

            if (issues.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body
              })
              console.log(`Updated existing issue #${issues[0].number}`)
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔗 Events: ${broken} broken + ${stale} stale links — ${new Date().toISOString().split('T')[0]}`,
                body,
                labels: ['events-link-check']
              })
              console.log('Created new issue')
            }
