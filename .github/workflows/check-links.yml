name: Site-wide link check

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC (same as events check)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  check-links:
    name: Check all site links
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run site-wide link checker
        id: check
        continue-on-error: true   # We handle failure via GitHub Issue, not CI failure
        env:
          LINK_REPORT_PATH: /tmp/link_report.md
        run: |
          python3 .github/scripts/check-all-links.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Read outputs (fallback if step above errored out early)
        id: read_outputs
        run: |
          # If GITHUB_OUTPUT wasn't written (script crashed), set defaults
          if ! grep -q 'has_issue' "$GITHUB_OUTPUT" 2>/dev/null; then
            echo "has_issue=true"    >> "$GITHUB_OUTPUT"
            echo "hard_fail=true"   >> "$GITHUB_OUTPUT"
            echo "html_broken=?"    >> "$GITHUB_OUTPUT"
            echo "feed_broken=?"    >> "$GITHUB_OUTPUT"
            echo "art_broken=?"     >> "$GITHUB_OUTPUT"
            echo "ev_broken=?"      >> "$GITHUB_OUTPUT"
            echo "ev_stale=?"       >> "$GITHUB_OUTPUT"
            # Write a basic crash report if none exists
            if [ ! -f /tmp/link_report.md ]; then
              echo "# ❌ Link checker crashed" > /tmp/link_report.md
              echo "The link checker script exited unexpectedly. Check the Actions log." >> /tmp/link_report.md
            fi
          fi

      - name: Create or update GitHub Issue with results
        if: >
          steps.check.outputs.has_issue == 'true'
          || steps.check.outcome == 'failure'
          || steps.check.outputs.hard_fail == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')

            // Read report
            let report = '*(no report generated)*'
            try { report = fs.readFileSync('/tmp/link_report.md', 'utf8') } catch {}

            const today    = new Date().toISOString().split('T')[0]
            const html_broken = '${{ steps.check.outputs.html_broken }}' || '?'
            const feed_broken = '${{ steps.check.outputs.feed_broken }}' || '?'
            const art_broken  = '${{ steps.check.outputs.art_broken }}'  || '?'
            const ev_broken   = '${{ steps.check.outputs.ev_broken }}'   || '?'
            const ev_stale    = '${{ steps.check.outputs.ev_stale }}'    || '?'

            const isClean =
              html_broken === '0' && feed_broken === '0' &&
              art_broken  === '0' && ev_broken   === '0' &&
              ev_stale    === '0'

            const title = isClean
              ? `✅ All site links OK — ${today}`
              : `🔗 Site links: HTML:${html_broken}❌ Feeds:${feed_broken}❌ Articles:${art_broken}⚠️ Events:${ev_broken}❌ Stale:${ev_stale}⏰ — ${today}`

            const body = `## 🔗 Site-wide link check — ${today}

            ${report}

            ---
            ### 📋 How to fix

            **Static HTML links broken** → Edit the relevant \`portal/*.html\` file directly.

            **Pipeline feeds broken** → Edit \`pipeline/config.json\`, update or remove the broken feed URL.

            **Article URLs broken** → Open \`portal/js/articles.json\`, find the article by title/date, and either update its \`url\` or remove the entry.

            **Event links broken or stale** →
            1. Update the \`url\` field in \`portal/data/events.json\`
            2. Set \`url_verified\` to today's date (\`${today}\`)
            3. Run \`node .github/scripts/build-events.mjs\` to rebuild the events page

            ---
            *Auto-generated by [Site-wide link check](https://github.com/${{ github.repository }}/actions/workflows/check-links.yml) · Every Monday 07:00 UTC*`

            // Look for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'link-check',
              state:  'open',
            })

            if (issues.length > 0) {
              // Add comment to existing issue (keeps history, avoids noise)
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issues[0].number,
                body,
              })
              console.log(`Updated existing issue #${issues[0].number}`)
            } else {
              // Create a fresh issue
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body,
                labels: ['link-check'],
              })
              console.log('Created new link-check issue')
            }

      - name: Close issue if everything is clean
        if: >
          steps.check.outcome == 'success'
          && steps.check.outputs.has_issue != 'true'
          && steps.check.outputs.hard_fail != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0]

            // Close any open link-check issue — everything is healthy
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'link-check',
              state:  'open',
            })

            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                body: `✅ All site links are healthy as of ${today}. Closing this issue.`,
              })
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              })
              console.log(`Closed issue #${issue.number}`)
            }

      - name: Send email notification via Brevo
        if: always()   # Always send — success OR failure
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_FROM:   ${{ secrets.NOTIFY_FROM_EMAIL }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, datetime

          api_key    = os.environ.get('BREVO_API_KEY', '')
          to_email   = os.environ.get('NOTIFY_EMAIL', '')
          from_email = os.environ.get('NOTIFY_FROM', '')

          if not api_key or not to_email or not from_email:
              print('⚠️  BREVO_API_KEY / NOTIFY_EMAIL / NOTIFY_FROM_EMAIL not set — skipping email')
              exit(0)

          # Read outputs from environment (passed via GITHUB_OUTPUT in the check step)
          html_broken = '${{ steps.check.outputs.html_broken }}'  or '?'
          feed_broken = '${{ steps.check.outputs.feed_broken }}'  or '?'
          art_broken  = '${{ steps.check.outputs.art_broken }}'   or '?'
          ev_broken   = '${{ steps.check.outputs.ev_broken }}'    or '?'
          ev_stale    = '${{ steps.check.outputs.ev_stale }}'     or '?'
          outcome     = '${{ steps.check.outcome }}'

          today = datetime.date.today().strftime('%Y-%m-%d')
          run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'

          all_ok = (html_broken == '0' and feed_broken == '0' and
                    art_broken  == '0' and ev_broken  == '0' and
                    ev_stale    == '0')

          status_icon  = '✅' if all_ok else '⚠️' if outcome == 'success' else '❌'
          status_label = 'Tout est OK' if all_ok else 'Avertissements' if outcome == 'success' else 'Erreurs détectées'

          # ── Build HTML email ─────────────────────────────────────────────────
          def row(icon, label, count, ok_val='0'):
              color = '#16a34a' if count == ok_val else '#dc2626' if count not in ('0', '?') else '#92400e'
              badge = f'<span style="background:{color};color:#fff;padding:2px 10px;border-radius:12px;font-size:13px;font-weight:700">{count}</span>'
              return f'<tr><td style="padding:8px 0;color:#374151">{icon} {label}</td><td style="text-align:right">{badge}</td></tr>'

          table_rows  = row('🔗', 'Liens HTML statiques cassés',        html_broken)
          table_rows += row('📡', 'Flux RSS/API pipeline cassés',       feed_broken)
          table_rows += row('📰', 'Articles récents cassés (30j)',       art_broken)
          table_rows += row('🗓️', 'Liens événements cassés',            ev_broken)
          table_rows += row('⏰', 'Liens événements non re-vérifiés (90j+)', ev_stale)

          header_bg = '#16a34a' if all_ok else '#b45309' if outcome == 'success' else '#dc2626'

          html = f"""
          <div style="font-family:Inter,system-ui,sans-serif;max-width:600px;margin:0 auto;background:#f9fafb;padding:24px;border-radius:12px">
            <div style="background:{header_bg};color:#fff;padding:20px 24px;border-radius:8px;margin-bottom:20px">
              <div style="font-size:22px;font-weight:700">{status_icon} Vérification des liens — {today}</div>
              <div style="font-size:14px;opacity:.85;margin-top:4px">{status_label} · Pharma AI &amp; Data Watch</div>
            </div>

            <div style="background:#fff;padding:20px 24px;border-radius:8px;margin-bottom:16px;border:1px solid #e5e7eb">
              <table style="width:100%;border-collapse:collapse">
                {table_rows}
              </table>
            </div>

            <div style="background:#fff;padding:16px 24px;border-radius:8px;border:1px solid #e5e7eb;font-size:13px;color:#6b7280">
              {'<p style="color:#16a34a;font-weight:600">✅ Tous les liens sont accessibles. Aucune action requise.</p>' if all_ok else
               '<p>Des problèmes ont été détectés. Voir le rapport complet sur GitHub&nbsp;:</p>'}
              <a href="{run_url}" style="display:inline-block;margin-top:8px;background:#1d4ed8;color:#fff;padding:8px 18px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600">
                Voir le rapport Actions →
              </a>
            </div>

            <p style="font-size:11px;color:#9ca3af;text-align:center;margin-top:16px">
              Vérification automatique · chaque lundi 07h00 UTC ·
              <a href="https://github.com/${{ github.repository }}/actions/workflows/check-links.yml" style="color:#9ca3af">Désactiver</a>
            </p>
          </div>
          """

          subject = f"{status_icon} Liens site — {status_label} · {today}"

          payload = {
              'sender':      {'name': 'Pharma AI Watch', 'email': from_email},
              'to':          [{'email': to_email}],
              'subject':     subject,
              'htmlContent': html,
          }

          req = urllib.request.Request(
              'https://api.brevo.com/v3/smtp/email',
              data    = json.dumps(payload).encode(),
              headers = {'Content-Type': 'application/json', 'api-key': api_key},
              method  = 'POST',
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'✅ Email envoyé à {to_email} (status {r.status})')
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f'❌ Brevo API error {e.code}: {body}')
              exit(1)
          PYEOF

      - name: Upload link report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-report-${{ github.run_id }}
          path: /tmp/link_report.md
          retention-days: 30
