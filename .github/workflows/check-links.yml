name: Site-wide link check

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC (same as events check)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  check-links:
    name: Check all site links
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run site-wide link checker
        id: check
        continue-on-error: true   # We handle failure via GitHub Issue, not CI failure
        env:
          LINK_REPORT_PATH: /tmp/link_report.md
        run: |
          python3 .github/scripts/check-all-links.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Read outputs (fallback if step above errored out early)
        id: read_outputs
        run: |
          # If GITHUB_OUTPUT wasn't written (script crashed), set defaults
          if ! grep -q 'has_issue' "$GITHUB_OUTPUT" 2>/dev/null; then
            echo "has_issue=true"    >> "$GITHUB_OUTPUT"
            echo "hard_fail=true"   >> "$GITHUB_OUTPUT"
            echo "html_broken=?"    >> "$GITHUB_OUTPUT"
            echo "feed_broken=?"    >> "$GITHUB_OUTPUT"
            echo "art_broken=?"     >> "$GITHUB_OUTPUT"
            echo "ev_broken=?"      >> "$GITHUB_OUTPUT"
            echo "ev_stale=?"       >> "$GITHUB_OUTPUT"
            # Write a basic crash report if none exists
            if [ ! -f /tmp/link_report.md ]; then
              echo "# ❌ Link checker crashed" > /tmp/link_report.md
              echo "The link checker script exited unexpectedly. Check the Actions log." >> /tmp/link_report.md
            fi
          fi

      - name: Create or update GitHub Issue with results
        if: >
          steps.check.outputs.has_issue == 'true'
          || steps.check.outcome == 'failure'
          || steps.check.outputs.hard_fail == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')

            // Read report
            let report = '*(no report generated)*'
            try { report = fs.readFileSync('/tmp/link_report.md', 'utf8') } catch {}

            const today    = new Date().toISOString().split('T')[0]
            const html_broken = '${{ steps.check.outputs.html_broken }}' || '?'
            const feed_broken = '${{ steps.check.outputs.feed_broken }}' || '?'
            const art_broken  = '${{ steps.check.outputs.art_broken }}'  || '?'
            const ev_broken   = '${{ steps.check.outputs.ev_broken }}'   || '?'
            const ev_stale    = '${{ steps.check.outputs.ev_stale }}'    || '?'

            const isClean =
              html_broken === '0' && feed_broken === '0' &&
              art_broken  === '0' && ev_broken   === '0' &&
              ev_stale    === '0'

            const title = isClean
              ? `✅ All site links OK — ${today}`
              : `🔗 Site links: HTML:${html_broken}❌ Feeds:${feed_broken}❌ Articles:${art_broken}⚠️ Events:${ev_broken}❌ Stale:${ev_stale}⏰ — ${today}`

            const body = `## 🔗 Site-wide link check — ${today}

            ${report}

            ---
            ### 📋 How to fix

            **Static HTML links broken** → Edit the relevant \`portal/*.html\` file directly.

            **Pipeline feeds broken** → Edit \`pipeline/config.json\`, update or remove the broken feed URL.

            **Article URLs broken** → Open \`portal/js/articles.json\`, find the article by title/date, and either update its \`url\` or remove the entry.

            **Event links broken or stale** →
            1. Update the \`url\` field in \`portal/data/events.json\`
            2. Set \`url_verified\` to today's date (\`${today}\`)
            3. Run \`node .github/scripts/build-events.mjs\` to rebuild the events page

            ---
            *Auto-generated by [Site-wide link check](https://github.com/${{ github.repository }}/actions/workflows/check-links.yml) · Every Monday 07:00 UTC*`

            // Look for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'link-check',
              state:  'open',
            })

            if (issues.length > 0) {
              // Add comment to existing issue (keeps history, avoids noise)
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issues[0].number,
                body,
              })
              console.log(`Updated existing issue #${issues[0].number}`)
            } else {
              // Create a fresh issue
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body,
                labels: ['link-check'],
              })
              console.log('Created new link-check issue')
            }

      - name: Close issue if everything is clean
        if: >
          steps.check.outcome == 'success'
          && steps.check.outputs.has_issue != 'true'
          && steps.check.outputs.hard_fail != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0]

            // Close any open link-check issue — everything is healthy
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'link-check',
              state:  'open',
            })

            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                body: `✅ All site links are healthy as of ${today}. Closing this issue.`,
              })
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              })
              console.log(`Closed issue #${issue.number}`)
            }

      - name: Upload link report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-report-${{ github.run_id }}
          path: /tmp/link_report.md
          retention-days: 30
