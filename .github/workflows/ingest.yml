name: Daily content ingestion

on:
  schedule:
    # Runs every day at 06:00 UTC (08:00 Brussels time)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab
    inputs:
      source:
        description: "Source to fetch (pubmed / biorxiv / regulatory / ainews / all)"
        required: false
        default: "all"
      auto_approve_all:
        description: "Auto-approve all items above min score (true/false)"
        required: false
        default: "false"

jobs:
  ingest:
    name: Fetch and publish new articles
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push articles.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run ingestion pipeline
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY:       ${{ secrets.NCBI_API_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          AUTO="${{ github.event.inputs.auto_approve_all || 'false' }}"

          CMD="python pipeline/pipeline.py --source $SOURCE"
          if [ "$AUTO" = "true" ]; then
            CMD="$CMD --auto-approve-all"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Commit and push updated articles.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add portal/js/articles.json pipeline/processed/seen_ids.json

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No new articles — nothing to commit."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: auto-ingest articles — $TIMESTAMP"
            git push
          fi

      - name: Upload draft files as artefact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drafts-${{ github.run_id }}
          path: pipeline/drafts/
          retention-days: 14
