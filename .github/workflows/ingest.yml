name: Daily content ingestion

on:
  schedule:
    # Runs every day at 06:00 UTC (08:00 Brussels time)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab
    inputs:
      source:
        description: "Source to fetch (pubmed / biorxiv / regulatory / ainews / events / all)"
        required: false
        default: "all"
      auto_approve_all:
        description: "Auto-approve all items above min score (true/false)"
        required: false
        default: "false"

# Prevent two runs from racing on git pushes.
# cancel-in-progress: false → a new scheduled run queues instead of
# killing a run that is already writing to master / gh-pages.
concurrency:
  group: ingest-pipeline
  cancel-in-progress: false

jobs:
  ingest:
    name: Fetch and publish new articles
    runs-on: ubuntu-latest
    timeout-minutes: 30   # fail fast if a step hangs (default is 6 h)

    permissions:
      contents: write   # needed to push articles.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for cross-branch git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run ingestion pipeline
        env:
          NEWSAPI_KEY:       ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY:      ${{ secrets.NCBI_API_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          AUTO="${{ github.event.inputs.auto_approve_all || 'false' }}"

          CMD="python pipeline/pipeline.py --source $SOURCE"
          if [ "$AUTO" = "true" ]; then
            CMD="$CMD --auto-approve-all"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Generate RSS feed
        run: node .github/scripts/build-rss.mjs

      - name: Generate sitemap.xml
        run: node .github/scripts/build-sitemap.mjs || true

      - name: Rebuild events.html from events.json (warns on stale links)
        run: node .github/scripts/build-events.mjs || true

      - name: Commit and push updated articles.json + feed.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add portal/js/articles.json portal/js/pipeline_meta.json pipeline/processed/seen_ids.json portal/feed.xml portal/sitemap.xml portal/events.html portal/data/events.json

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No new articles — nothing to commit."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: auto-ingest articles — $TIMESTAMP"
            # Pull with rebase first to handle any concurrent pushes to master
            git pull --rebase origin master
            git push origin master
          fi

      - name: Sync articles.json to gh-pages (live site)
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Capture updated files from master before switching branches
          cp portal/js/articles.json /tmp/articles.json
          cp portal/js/pipeline_meta.json /tmp/pipeline_meta.json 2>/dev/null || true
          cp portal/feed.xml /tmp/feed.xml
          cp portal/sitemap.xml /tmp/sitemap.xml 2>/dev/null || true
          cp portal/events.html /tmp/events.html

          git fetch origin gh-pages
          git checkout gh-pages

          # Always sync latest app.js from master and inject Brevo key
          git show origin/master:portal/js/app.js > js/app.js
          if [ -n "${BREVO_API_KEY:-}" ]; then
            sed -i "s|__BREVO_API_KEY__|${BREVO_API_KEY}|g" js/app.js
          fi

          CHANGED=false

          # Check articles.json
          if ! diff -q /tmp/articles.json js/articles.json > /dev/null 2>&1; then
            cp /tmp/articles.json js/articles.json
            CHANGED=true
          fi

          # Check feed.xml
          if ! diff -q /tmp/feed.xml feed.xml > /dev/null 2>&1; then
            cp /tmp/feed.xml feed.xml
            CHANGED=true
          fi

          # Check pipeline_meta.json
          if [ -f /tmp/pipeline_meta.json ]; then
            mkdir -p js
            if ! diff -q /tmp/pipeline_meta.json js/pipeline_meta.json > /dev/null 2>&1; then
              cp /tmp/pipeline_meta.json js/pipeline_meta.json
              CHANGED=true
            fi
          fi

          # Check sitemap.xml
          if [ -f /tmp/sitemap.xml ]; then
            if ! diff -q /tmp/sitemap.xml sitemap.xml > /dev/null 2>&1; then
              cp /tmp/sitemap.xml sitemap.xml
              CHANGED=true
            fi
          fi

          # Check events.html
          if ! diff -q /tmp/events.html events.html > /dev/null 2>&1; then
            cp /tmp/events.html events.html
            CHANGED=true
          fi

          # Check app.js (will differ due to key injection)
          if ! git diff --quiet js/app.js; then
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git add js/articles.json js/pipeline_meta.json js/app.js feed.xml sitemap.xml events.html
            git commit -m "chore: sync to gh-pages — $TIMESTAMP"
            # Pull with rebase to handle any concurrent pushes to gh-pages
            git pull --rebase origin gh-pages
            git push origin gh-pages
            echo "gh-pages updated."
          else
            echo "No changes to sync to gh-pages."
          fi

          # Return to master so subsequent steps work on the right branch
          git checkout master

      - name: Notify on pipeline failure via Brevo
        if: failure()
        env:
          BREVO_API_KEY:   ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL:    ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_FROM:     ${{ secrets.NOTIFY_FROM_EMAIL }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, datetime

          api_key    = os.environ.get('BREVO_API_KEY', '')
          to_email   = os.environ.get('NOTIFY_EMAIL', '')
          from_email = os.environ.get('NOTIFY_FROM', '')

          if not api_key or not to_email or not from_email:
              print('⚠️  Email secrets not configured — skipping failure alert')
              exit(0)

          today   = datetime.date.today().isoformat()
          run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'

          html = f"""
          <div style="font-family:Inter,system-ui,sans-serif;max-width:600px;margin:0 auto;background:#f9fafb;padding:24px;border-radius:12px">
            <div style="background:#dc2626;color:#fff;padding:20px 24px;border-radius:8px;margin-bottom:20px">
              <div style="font-size:22px;font-weight:700">❌ Pipeline d'ingestion en échec</div>
              <div style="font-size:14px;opacity:.85;margin-top:4px">{today} · Pharma AI &amp; Data Watch</div>
            </div>
            <div style="background:#fff;padding:20px 24px;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:16px">
              <p style="color:#374151;margin-bottom:12px">
                Le pipeline quotidien d'ingestion d'articles a rencontré une erreur.
                Le site n'a pas été mis à jour ce jour.
              </p>
              <p style="color:#374151;font-size:13px">
                Causes fréquentes : quota NCBI dépassé · API Anthropic indisponible ·
                flux RSS inaccessible · erreur de commit git.
              </p>
            </div>
            <a href="{run_url}" style="display:inline-block;background:#1d4ed8;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600">
              Voir le log Actions →
            </a>
            <p style="font-size:11px;color:#9ca3af;margin-top:16px">
              Notification automatique · pipeline ingest.yml
            </p>
          </div>
          """

          payload = {
              'sender':      {'name': 'Pharma AI Watch', 'email': from_email},
              'to':          [{'email': to_email}],
              'subject':     f'❌ Pipeline ingestion failed — {today}',
              'htmlContent': html,
          }
          req = urllib.request.Request(
              'https://api.brevo.com/v3/smtp/email',
              data    = json.dumps(payload).encode(),
              headers = {'Content-Type': 'application/json', 'api-key': api_key},
              method  = 'POST',
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'✅ Failure alert sent to {to_email}')
          except Exception as e:
              print(f'Could not send failure email: {e}')
          PYEOF

      - name: Upload draft files as artefact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drafts-${{ github.run_id }}
          path: pipeline/drafts/
          retention-days: 14
