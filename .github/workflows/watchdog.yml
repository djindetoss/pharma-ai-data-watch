name: Pipeline watchdog

# Runs 3 hours after the scheduled ingest (06:00 UTC).
# If no successful ingest run has completed today, it re-triggers it.
# This guards against GitHub's scheduler silently skipping runs.

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC — checks whether 06:00 run happened
  workflow_dispatch:        # Manual trigger for testing

jobs:
  watchdog:
    name: Ensure daily ingest ran
    runs-on: ubuntu-latest

    permissions:
      actions: write    # needed to trigger workflow_dispatch

    steps:
      - name: Check if ingest ran today
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Checking for successful ingest runs on $TODAY …"

          # List recent completed runs of ingest.yml
          RUNS=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow ingest.yml \
            --status completed \
            --limit 5 \
            --json conclusion,createdAt \
            --jq ".[] | select(.conclusion == \"success\" and (.createdAt | startswith(\"$TODAY\")))")

          if [ -n "$RUNS" ]; then
            echo "✅ Ingest already ran successfully today ($TODAY). Nothing to do."
            echo "needs_rerun=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  No successful ingest found for $TODAY — will trigger a re-run."
            echo "needs_rerun=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-trigger ingest pipeline
        if: steps.check.outputs.needs_rerun == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ingest.yml \
            --repo "${{ github.repository }}" \
            --ref master
          echo "✅ Ingest re-triggered by watchdog at $(date -u)"

      - name: Notify if watchdog had to re-trigger
        if: steps.check.outputs.needs_rerun == 'true'
        env:
          BREVO_API_KEY:   ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL:    ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_FROM:     ${{ secrets.NOTIFY_FROM_EMAIL }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, datetime

          api_key    = os.environ.get('BREVO_API_KEY', '')
          to_email   = os.environ.get('NOTIFY_EMAIL', '')
          from_email = os.environ.get('NOTIFY_FROM', '')

          if not api_key or not to_email or not from_email:
              print('Email secrets not configured — skipping watchdog notification')
              exit(0)

          today   = datetime.date.today().isoformat()
          run_url = 'https://github.com/${{ github.repository }}/actions/workflows/ingest.yml'

          html = f"""
          <div style="font-family:Inter,system-ui,sans-serif;max-width:600px;margin:0 auto;background:#f9fafb;padding:24px;border-radius:12px">
            <div style="background:#b45309;color:#fff;padding:20px 24px;border-radius:8px;margin-bottom:20px">
              <div style="font-size:22px;font-weight:700">⚠️ Pipeline watchdog — re-déclenchement automatique</div>
              <div style="font-size:14px;opacity:.85;margin-top:4px">{today} · Pharma AI &amp; Data Watch</div>
            </div>
            <div style="background:#fff;padding:20px 24px;border-radius:8px;border:1px solid #e5e7eb">
              <p style="color:#374151;margin-bottom:12px">
                Le pipeline d'ingestion prévu à <strong>06h00 UTC</strong> n'avait pas tourné aujourd'hui.
              </p>
              <p style="color:#374151;margin-bottom:12px">
                Le watchdog a <strong>déclenché automatiquement</strong> un nouveau run à 09h00 UTC.
                Le site sera mis à jour dans les prochaines minutes.
              </p>
              <p style="color:#6b7280;font-size:13px">
                Cause probable : GitHub Actions a ignoré le run schedulé (pic de charge ou repos peu actif).
                Aucune action requise de ta part.
              </p>
            </div>
            <a href="{run_url}" style="display:inline-block;margin-top:16px;background:#1d4ed8;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600">
              Voir les runs →
            </a>
          </div>
          """

          payload = {
              'sender':      {'name': 'Pharma AI Watch', 'email': from_email},
              'to':          [{'email': to_email}],
              'subject':     f'⚠️ Watchdog: pipeline re-déclenché automatiquement — {today}',
              'htmlContent': html,
          }
          req = urllib.request.Request(
              'https://api.brevo.com/v3/smtp/email',
              data    = json.dumps(payload).encode(),
              headers = {'Content-Type': 'application/json', 'api-key': api_key},
              method  = 'POST',
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'✅ Watchdog alert sent to {to_email}')
          except Exception as e:
              print(f'Could not send watchdog email: {e}')
          PYEOF
